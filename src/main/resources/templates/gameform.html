<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${gameForm.id == null ? 'Add game' : 'Edit game'}">Add game</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container">
    <section class="card simple-form">
        <h1 th:text="${gameForm.id == null ? 'Add game' : 'Edit game'}">Add game</h1>
        <p th:if="${gameForm.id == null}">Fill in the details to save a new game.</p>
        <p th:if="${gameForm.id != null}">Update the existing game details.</p>
        <form method="post" th:object="${gameForm}" th:action="@{/savegame}" class="stack">
            <input type="hidden" th:field="*{id}">
            <label>
                Title
                <input type="text" th:field="*{title}" required>
                <span class="field-error" th:errors="*{title}"></span>
            </label>
            <label>
                Developer
                <input type="text" th:field="*{developer}">
                <span class="field-error" th:errors="*{developer}"></span>
            </label>
            <label>
                Platform
                <input type="text" th:field="*{platform}" required>
                <span class="field-error" th:errors="*{platform}"></span>
            </label>
            <label>
                Status
                <select name="statusId" required>
                    <option value="">Select a status</option>
                    <option th:each="statusOption : ${statuses}"
                            th:value="${statusOption.statusId}"
                            th:text="${statusOption.statusName}"
                            th:selected="${gameForm.status != null and gameForm.status.statusId == statusOption.statusId}"></option>
                </select>
                <span class="field-error" th:errors="*{status}"></span>
            </label>
            <label>
                Release date
                <input type="date" th:field="*{releaseDate}">
            </label>
            <label>
                Notes
                <textarea th:field="*{notes}" rows="4"></textarea>
                <span class="field-error" th:errors="*{notes}"></span>
            </label>
            <button type="submit">Save game</button>
            <p><a th:href="@{/games}">Cancel</a></p>
        </form>
    </section>
</main>
</body>
</html>

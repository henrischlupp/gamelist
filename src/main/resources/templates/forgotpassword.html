<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container">
    <section class="card simple-form">
        <h1>Forgot password</h1>
        <p>Enter your email address and we will send a reset link.</p>
        <form method="post" th:action="@{/forgotpassword}" class="stack">
            <label>
                Email
                <input type="email" name="email" required>
            </label>
            <button type="submit">Send reset email</button>
        </form>
        <p th:if="${message}" class="message success" th:text="${message}"></p>
        <p th:if="${error}" class="message error" th:text="${error}"></p>
        <p><a th:href="@{/login}">Back to login</a></p>
    </section>
</main>
</body>
</html>

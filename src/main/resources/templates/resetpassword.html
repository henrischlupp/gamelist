<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org/"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

<head>
    <title>Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-beige">

    <div class="col-md-4 offset-md-4 mt-5">
        <div class="card shadow-sm p-4">
            <h2 class="mb-3 text-center">MovieHub</h2>
            <p class="text-center text-muted">Create a new password for your account.</p>

            <form th:object="${resetform}" th:action="@{/resetpassword}" method="post">
                <input type="hidden" name="token" th:value="${token}" />

                <div class="mb-3">
                    <label>Password:
                        <input type="password" th:field="{password}" class="form-control" />
                    </label>
                    <p class="text-danger mt-1" th:if="${#fields.hasErrors('password')}" th:errors="{password}">
                        Password Error
                    </p>
                </div>

                <div class="mb-3">
                    <label>Re-type Password:
                        <input type="password" th:field="{passwordCheck}" class="form-control" />
                    </label>
                    <p class="text-danger mt-1" th:if="${#fields.hasErrors('passwordCheck')}" th:errors="{passwordCheck}">
                        Password Match Error
                    </p>
                </div>

                <div class="mt-3">
                    <input type="submit" class="btn btn-primary" value="Reset password" />
                </div>
            </form>

            <div class="mt-3">
                <a th:href="@{/login}">Back to login</a>
            </div>
        </div>
    </div>

</body>
</html>

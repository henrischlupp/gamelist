<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container">
    <section class="card simple-form">
        <h1>Reset password</h1>
        <p>Create a new password for your account.</p>

        <form th:object="${resetform}" th:action="@{/resetpassword}" method="post" class="stack">
            <input type="hidden" name="token" th:value="${token}">

            <label>
                New password
                <input type="password" th:field="*{password}" required>
                <span class="field-error" th:errors="*{password}"></span>
            </label>

            <label>
                Confirm new password
                <input type="password" th:field="*{passwordCheck}" required>
                <span class="field-error" th:errors="*{passwordCheck}"></span>
            </label>

            <button type="submit">Reset password</button>
        </form>

        <p><a th:href="@{/login}">Back to login</a></p>
    </section>
</main>
</body>
</html>
